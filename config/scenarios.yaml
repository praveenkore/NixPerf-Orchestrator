scenarios:
  - name: login_test
    jmx_path: scenarios/login.jmx
    load_steps: [500, 1000, 2000, 5000, 10000, 15000]

    ramp_strategy:
      type: constant_arrival
      arrival_rate: 5         # users injected per second → rampup = users / 5

    retry_count: 1            # retry once on JMeter failure
    timeout_seconds: 7200     # kill JMeter after 2 hours
    mode: static              # static | adaptive (Phase 2)

    sla:
      p95: 2000               # milliseconds
      error_threshold: 50     # percent
